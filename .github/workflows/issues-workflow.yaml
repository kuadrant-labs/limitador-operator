name: Add issues to project

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

jobs:
  add-to-project:
    name: Add issue to project
    # Only run jobs if the feature branch is in your repo (not in a fork)
    # OR
    # it is an issue
    # AND
    # it is not a Dependabot PR (secrets are not available to Dependabot)
    if: (github.event.pull_request.head.repo.full_name == github.repository || github.event.issue.number != '') && (github.event_name == 'issues' || github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Mock Add issue to project
        run: |
          echo "Mocking add issue to project"

      - name: Sleep for x seconds
        run: sleep 10
